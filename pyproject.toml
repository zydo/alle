[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "alle-proxy"
version = "0.1.1"
description = "A universal VPN client that manages multiple VPN connections with rule-based routing."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "zydo" }]
keywords = ["vpn", "sing-box", "nordvpn", "wireguard", "proxy", "gateway"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Topic :: System :: Networking",
]
dependencies = ["pyyaml>=6.0", "pycountry>=23.12"]

[project.urls]
Homepage = "https://github.com/zydo/alle"
Issues = "https://github.com/zydo/alle/issues"

[project.scripts]
alle = "alle.cli:main"
alled = "alle.daemon:run_applier"

[tool.hatch.build.targets.wheel]
packages = ["src/alle"]

[tool.ruff]
line-length = 88
target-version = "py310"

[dependency-groups]
dev = ["ruff>=0.6", "pytest>=8.0", "pytest-cov>=5.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["src/alle"]
