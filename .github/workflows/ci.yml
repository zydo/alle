name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-suffix: lint-py3.14
      - run: uv lock --check
      - run: uv sync --locked --all-extras
      - name: Verify Docker runtime export matches the lock
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements-txt --output-file docker/requirements.lock
          git diff --exit-code -- docker/requirements.lock
      - name: Check lint (incl. flake8-bandit security rules)
        run: uv run ruff check
      - name: Check format
        run: uv run ruff format --check
      - name: Check types (mypy, zero-error baseline)
        run: uv run mypy
      - name: Check browser modules and stream protocols
        run: npm run check:web
      # The same package smoke publish gates on: catch sdist/wheel/README
      # regressions pre-merge instead of on the release tag.
      - name: Package smoke (build + metadata/README render)
        run: |
          uv build --no-build-isolation
          uvx twine check dist/*
          scripts/release-artifact-smoke.sh dist/*.whl
          scripts/release-artifact-smoke.sh dist/*.tar.gz
      # The OpenAPI spec is a hand-maintained committed contract nothing
      # executes at runtime — validate it so it can't rot into invalid
      # YAML/schema. (Spec↔code drift is covered by the test suite:
      # tests/test_openapi_contract.py.)
      - name: Validate the OpenAPI spec
        run: uvx --from openapi-spec-validator openapi-spec-validator docs/openapi.yaml
      # The docs are an entry-frame README + cross-linked topic pages; a
      # rename or move must not leave dangling relative links. Relative
      # targets only — external URLs are out of scope (flaky, and covered
      # nowhere better by failing CI on someone else's outage).
      - name: Check relative doc links
        run: |
          python3 - <<'EOF'
          import pathlib, re, sys

          broken = []
          files = [pathlib.Path("README.md"), *sorted(pathlib.Path("docs").glob("*.md"))]
          for md in files:
              for m in re.finditer(r"\]\(([^)\s]+)\)", md.read_text()):
                  target = m.group(1).split("#")[0]
                  if not target or target.startswith(("http://", "https://", "mailto:")):
                      continue
                  if not (md.parent / target).resolve().exists():
                      broken.append(f"{md}: {m.group(1)}")
          if broken:
              print("::error::broken relative doc links:")
              print("\n".join(broken))
              sys.exit(1)
          print(f"doc links ok ({len(files)} files)")
          EOF

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-suffix: test-py${{ matrix.python-version }}
      - run: uv lock --check
      - run: uv sync --locked --all-extras
      # Coverage (with branches) is measured on the newest Python only — the
      # floor is a ratchet set from the measured number, not an aspiration.
      - name: Run tests
        run: |
          if [ "${{ matrix.python-version }}" = "3.14" ]; then
            uv run pytest -q --cov=alle --cov-branch --cov-fail-under=84
          else
            uv run pytest -q
          fi

  # macOS is the primary desktop target: launchd daemonctl, the privileged
  # helper's install machinery, and the `ps` fallbacks only exercise their
  # real platform branches here. One job on the newest Python — the version
  # matrix stays on Linux.
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-suffix: test-macos-py3.14
      - run: uv lock --check
      - run: uv sync --locked --all-extras
      - run: uv run pytest -q

  # Build the container image and boot it against a synthetic no-credential
  # bundle, gated on the same `alle health` check the image's HEALTHCHECK
  # runs — so a PR can't silently break the Dockerfile, the entrypoint, or
  # the bundle-apply-at-start contract. The dummy WireGuard keys never pass
  # probes; everything under test (build, import, ports, health, the control
  # API's network bind + secret injection) is independent of tunnel health.
  # The only network fetch is the pinned, checksum-verified sing-box download
  # on first start.
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv lock --check && uv sync --locked && uv build --no-build-isolation --wheel
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image from the gated wheel
        run: |
          wheel_sha=$(sha256sum dist/*.whl | awk '{print $1}')
          docker buildx build --load --build-arg ALLE_WHEEL_SHA256="$wheel_sha" \
            --cache-from type=gha,scope=ci-docker \
            --cache-to type=gha,mode=max,scope=ci-docker -t alle:ci .
      - name: Boot with a synthetic bundle
        run: |
          key=$(python3 -c 'import base64; print(base64.b64encode(bytes([7]*32)).decode())')
          cat > /tmp/alle-bundle.yaml <<EOF
          kind: alle-bundle
          bundle_version: 1
          providers:
            protonvpn:
              channels:
                us_test:
                  port: 25000
                  wg:
                    private_key: $key
                    address: [10.5.0.2/32]
                    peer: {public_key: $key, endpoint_host: 192.0.2.10, endpoint_port: 51820,
                           allowed_ips: [0.0.0.0/0], keepalive: 25}
          router:
            killswitch: false
            lan_direct: true
            rulesets:
              - name: ci-direct
                target: direct
                matchers: [all]
          EOF
          docker network create alle-ci-net
          docker run -d --name alle-ci --network alle-ci-net \
            -e ALLE_API_LISTEN=0.0.0.0:8080 \
            -e ALLE_API_SECRET=ci-test-secret-0123456789 \
            --mount type=volume,src=alle-ci-state,dst=/var/lib/alle \
            --mount type=bind,src=/tmp/alle-bundle.yaml,dst=/etc/alle/bundle.yaml,readonly \
            alle:ci
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if docker exec alle-ci alle health; then exit 0; fi
            sleep 5
          done
          echo "::error::container never became healthy"
          docker logs alle-ci
          exit 1
      - name: Assert the bundle applied
        run: |
          docker exec alle-ci alle channels ls | tee /tmp/ls.out
          grep -q "us_test" /tmp/ls.out
          grep -q ":25000" /tmp/ls.out
          # the image profile widens binds to the container network
          docker exec alle-ci sh -c 'grep -o "\"listen\": \"[^\"]*\"" /var/lib/alle/singbox.json | sort -u' \
            | grep -q '0.0.0.0'
      # The OCI user contract: proxy mode is non-root in the image metadata
      # (numeric, so runAsNonRoot-style admission checks can verify it), PID 1
      # actually runs as uid 1000, and the named state volume is usable by it.
      - name: Assert the OCI user contract
        run: |
          [ "$(docker inspect -f '{{.Config.User}}' alle:ci)" = "1000:1000" ]
          [ "$(docker exec alle-ci id -u)" = "1000" ]
          [ "$(docker exec alle-ci sh -c "awk '/^Uid:/{print \$2}' /proc/1/status")" = "1000" ]
          docker exec alle-ci sh -c 'test -O /var/lib/alle/state.json'
      # Startup sync must be idempotent: a restart re-syncs the same bundle
      # and must neither duplicate its ruleset nor change the managed setup.
      - name: Assert restart idempotency (startup sync)
        run: |
          docker restart alle-ci
          for i in $(seq 1 30); do
            if docker exec alle-ci alle health; then break; fi
            sleep 5
          done
          count=$(docker exec alle-ci alle export --out - | grep -c "ci-direct")
          [ "$count" = "1" ] || { echo "::error::ruleset duplicated on restart (count=$count)"; exit 1; }
      # The mount contract fails loud: a directory at the bundle path (what a
      # short -v mount creates from a missing host file) must refuse the boot.
      - name: Assert a directory bundle path is refused
        run: |
          mkdir -p /tmp/alle-empty-dir
          if docker run --rm --mount type=bind,src=/tmp/alle-empty-dir,dst=/etc/alle/bundle.yaml,readonly \
              alle:ci alle run 2>/tmp/dir-bundle.log; then
            echo "::error::entrypoint accepted a directory at the bundle path"
            exit 1
          fi
          grep -q "is a directory" /tmp/dir-bundle.log
      # The compose-sibling contract for the control API: on an explicit
      # network bind, a valid Bearer (the injected secret) passes a foreign
      # Host, an unauthenticated request is refused, and /health serves
      # without the secret. Probed from a sibling container on the same
      # network — the exact posture docs/api.md promises operators.
      - name: Assert the control API contract (network bind + Bearer)
        run: |
          docker run -i --rm --network alle-ci-net --entrypoint python3 alle:ci - <<'EOF'
          import json, urllib.error, urllib.request

          BASE = "http://alle-ci:8080"
          AUTH = {"Authorization": "Bearer ci-test-secret-0123456789"}

          # Bearer passes the foreign-Host gate; the injected secret is live
          req = urllib.request.Request(BASE + "/api/v1/status", headers=AUTH)
          data = json.load(urllib.request.urlopen(req, timeout=10))
          assert data["channel_count"] == 1, data

          # without the Bearer, a network caller is refused
          try:
              urllib.request.urlopen(BASE + "/api/v1/status", timeout=10)
              raise SystemExit("unauthenticated network request was not refused")
          except urllib.error.HTTPError as e:
              assert e.code == 403, e.code

          # /health answers its challenge without the secret (readiness gating)
          data = json.load(urllib.request.urlopen(BASE + "/health?nonce=ci", timeout=10))
          assert data.get("proof"), data
          print("control API contract ok")
          EOF
      # The gateway profile declares its fail-closed contract before
      # readiness: TUN + kill switch land in state at boot, privileges are
      # verified, and health stays red (no viable channel — dummy keys never
      # probe healthy) so Compose dependants would stay unstarted.
      - name: Assert the gateway profile declares fail-closed readiness
        run: |
          docker run -d --name alle-ci-gw --network alle-ci-net \
            --user 0:0 --cap-add NET_ADMIN --device /dev/net/tun \
            -e ALLE_RUN_AS_ROOT=1 -e ALLE_GATEWAY=1 \
            --mount type=volume,src=alle-ci-gw-state,dst=/var/lib/alle \
            alle:ci
          # gateway health stays deliberately red here (no viable channel),
          # so wait only for process liveness before asserting the contract
          for i in $(seq 1 30); do
            docker exec alle-ci-gw alle health --json 2>/dev/null \
              | grep -q '"singbox": true' && break
            sleep 5
          done
          docker exec alle-ci-gw alle health --json | tee /tmp/gw-health.json || true
          python3 - <<'EOF'
          import json
          h = json.load(open("/tmp/gw-health.json"))
          gw = h["gateway"]
          assert h["ok"] is False, h                     # readiness gates dependants
          assert "viable_channel" in gw["failing"], gw   # the honest reason
          assert "declared_policy" not in gw["failing"], gw  # tun+ks were declared
          assert "privileges" not in gw["failing"], gw
          print("gateway readiness contract ok:", gw)
          EOF
          docker logs alle-ci-gw 2>&1 | grep -q "gateway profile — declaring TUN"
      # Foreground ownership: docker stop's SIGTERM tears down sing-box (and
      # with it the TUN) inside the grace period and exits cleanly.
      - name: Assert clean SIGTERM teardown
        run: |
          docker stop alle-ci
          [ "$(docker inspect -f '{{.State.ExitCode}}' alle-ci)" = "0" ]
          docker logs alle-ci 2>&1 | grep -q "data plane released"
      - name: Container logs on failure
        if: failure()
        run: |
          docker logs alle-ci || true
          docker logs alle-ci-gw || true
