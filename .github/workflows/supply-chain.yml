name: Supply Chain

# Runtime dependency intelligence: known-vulnerable Python dependencies (OSV,
# read straight from the pinned uv.lock) and leaked secrets (gitleaks). Runs on
# every PR and push to main so problems surface pre-merge, plus a weekly sweep
# to catch advisories published after a dependency was pinned. All Actions are
# pinned to immutable commit SHAs; the trailing comment records the tag.
on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC (off the :00 herd)
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  osv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Scan the lockfile, not pyproject.toml: osv-scanner reads the pinned
      # versions from uv.lock instead of resolving, so the result reflects what
      # actually installs.
      #
      # The repo's root action.yml is metadata-only (no runs:) — the runnable
      # scanner is the osv-scanner-action/ subdirectory action, a docker action
      # wrapping the same pinned release. Google recommends their reusable
      # workflow instead, but that wants security-events: write for a SARIF
      # upload this job doesn't need; the SHA pin freezes the sub-action's
      # behavior anyway.
      - name: OSV scan (uv.lock)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=uv.lock

  # The OSV job covers the Python dependency tree (uv.lock); this covers the
  # rest of the shipped container — the Debian base layer and anything pip
  # installed into it. Same rationale as the weekly OSV sweep: a digest-pinned
  # base image doesn't stop advisories from being published *after* the pin.
  # ignore-unfixed keeps the gate actionable (Debian carries many no-fix CVEs);
  # severity CRITICAL/HIGH with a hard exit code fails the run on real ones.
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-suffix: image-py3.14
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        run: |
          uv lock --check
          uv sync --locked
          uv build --no-build-isolation --wheel
          sha=$(sha256sum dist/*.whl | awk '{print $1}')
          docker buildx build --load --build-arg ALLE_WHEEL_SHA256="$sha" \
            --cache-from type=gha,scope=supply-chain-image \
            --cache-to type=gha,mode=max,scope=supply-chain-image -t alle:scan .
      - name: Trivy scan (image layers)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: alle:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0 # full history so the scheduled sweep scans all commits

      # False positives are handled in .gitleaks.toml (default ruleset + a
      # narrow allowlist), which gitleaks picks up from the repo root.
      - name: Secret scan
        # v3.0.0 = v2.3.9 on the node24 runtime (no behavior change); node20
        # actions are removed from hosted runners in September 2026.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
