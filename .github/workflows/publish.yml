name: Publish release

on:
  push:
    tags:
      - "v*"

# Release is gated on the full test/lint/format/package suite run on the exact
# tag checkout. Registry-specific work lives in reusable workflows with only
# the credentials each registry needs; the GitHub release is created only after
# both publishers succeed. Every third-party Action is pinned to an immutable
# commit SHA; the trailing comment records the tag it was resolved from.
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-suffix: publish-py3.14
          enable-cache: true

      - name: Verify lock freshness
        run: uv lock --check

      - name: Sync locked environment
        run: uv sync --locked

      - name: Verify Docker runtime export matches the lock
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements-txt --output-file docker/requirements.lock
          git diff --exit-code -- docker/requirements.lock

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' (normalized '$tag') does not match pyproject.toml version '$pkg'"
            exit 1
          fi

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Test
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: |
          uv build --no-build-isolation
          offline_dir="$RUNNER_TEMP/dist-offline"
          mkdir "$offline_dir"
          UV_OFFLINE=1 uv build --no-build-isolation --out-dir "$offline_dir"
          sha256sum dist/* "$offline_dir"/*
          for artifact in dist/*; do
            cmp "$artifact" "$offline_dir/$(basename "$artifact")"
          done

      - name: Package smoke (metadata + README render)
        run: |
          uvx twine check dist/*
          scripts/release-artifact-smoke.sh dist/*.whl
          scripts/release-artifact-smoke.sh dist/*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    permissions:
      id-token: write
    uses: ./.github/workflows/publish-pypi.yml

  publish-docker:
    needs: build
    permissions:
      contents: read
    uses: ./.github/workflows/publish-docker.yml
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  github-release:
    needs: [publish-pypi, publish-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: dist/*
          generate_release_notes: true
