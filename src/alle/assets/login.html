<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>alle — sign in</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="login-wrap">
    <form class="login" id="form">
      <div class="wordmark">
        <img class="wordmark-img" src="/wordmark.svg" alt="alle">
      </div>
      <p class="lead">Control Panel</p>
      <label class="eyebrow" for="token">Access token</label>
      <input id="token" name="token" type="password" autocomplete="off" spellcheck="false"
        placeholder="paste your token" autofocus>
      <button type="submit">Open dashboard</button>
      <p class="err" id="err">That token wasn't accepted. Check it and try again.</p>
      <p class="hint">
        Run <code>alle ui</code> in a terminal to open the dashboard automatically.<br>
        Or paste the <code>secret</code> from <code>~/.alle/control_api.json</code>.
      </p>
    </form>
  </div>

  <script type="module" src="/login.js"></script>
</body>

</html>
